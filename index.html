<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>To-Do List</title>

<style>
    body {
        font-family: Arial;
        background: linear-gradient(to right, #1e3c72, #2a5298);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .box {
        background: white;
        padding: 20px;
        border-radius: 10px;
        width: 300px;
        text-align: center;
    }

    input {
        width: 70%;
        padding: 8px;
    }

    button {
        padding: 8px;
        background: #2a5298;
        color: white;
        border: none;
        cursor: pointer;
    }

    li {
        margin-top: 10px;
        text-align: left;
    }

    .done {
        text-decoration: line-through;
        color: gray;
    }
</style>
</head>

<body>

<div class="box">
    <h2>To-Do List</h2>

    <input type="text" id="taskInput" placeholder="Add task">
    <button onclick="addTask()">Add</button>

    <ul id="list"></ul>
</div>

<script>
function addTask() {
    let input = document.getElementById("taskInput");
    let task = input.value;

    if (task === "") return;

    let li = document.createElement("li");
    li.innerText = task;

    li.onclick = function() {
        li.classList.toggle("done");
    };

    let del = document.createElement("button");
    del.innerText = "X";
    del.onclick = function() {
        li.remove();
    };

    li.appendChild(del);
    document.getElementById("list").appendChild(li);

    input.value = "";
}
</script>

</body>
</html>
